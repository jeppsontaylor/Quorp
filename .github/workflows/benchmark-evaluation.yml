name: benchmark-evaluation

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      run_smoke:
        description: "Run a live one-case benchmark smoke before scoring"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  scoring-gate:
    name: benchmark scoring gate
    runs-on: ubuntu-latest
    env:
      QUORP_BENCHMARK_RUN_SMOKE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_smoke == 'true' && '1' || '0' }}
      NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: Swatinem/rust-cache@v2

      - name: run benchmark scoring gate
        run: ./script/quorp-benchmark-regression-gate
