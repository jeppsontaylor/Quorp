name: Desktop release

# Manually triggered: builds a notarized Quorp Desktop DMG and
# uploads it as a workflow artifact. Run `gh workflow run desktop-release.yml`
# with the `version_tag` input set, then download the DMG from the
# completed run.

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag to embed in the DMG name (e.g. v0.1.0-rc.1)"
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build signed DMG
    runs-on: macos-14
    timeout-minutes: 60
    env:
      RUST_BACKTRACE: 1
      # APPLE_* secrets must be configured at the repo or org level.
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/desktop/src-tauri

      - name: Setup Node + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: corepack enable
      - run: corepack prepare pnpm@9 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('apps/desktop/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-

      - name: Import signing certificate
        if: env.APPLE_SIGNING_IDENTITY != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PWD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/quorp-build.keychain-db"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          echo -n "$MACOS_CERTIFICATE" | base64 --decode -o "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Stage notarytool API key
        if: env.APPLE_API_KEY_ID != ''
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/notary"
          echo "$API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/notary/AuthKey.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/notary/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Pre-flight Doctor
        run: ./script/quorp-desktop-doctor || true

      - name: Capabilities lint
        run: ./script/quorp-desktop-capabilities-lint

      - name: Build signed + notarized DMG
        if: env.APPLE_SIGNING_IDENTITY != ''
        run: ./script/quorp-desktop-build-dmg-signed

      - name: Build ad-hoc DMG (no signing identity)
        if: env.APPLE_SIGNING_IDENTITY == ''
        run: ./script/quorp-desktop-build-dmg

      - name: Locate built DMG
        id: locate
        run: |
          set -euo pipefail
          dmg=$(ls apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg | head -n1)
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: quorp-desktop-${{ inputs.version_tag }}
          path: ${{ steps.locate.outputs.dmg }}
          if-no-files-found: error
          retention-days: 30
