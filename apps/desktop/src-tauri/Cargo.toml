[package]
name = "quorp_desktop_app"
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "GPL-3.0-or-later"
authors = ["Quorp Team <hi@quorp.dev>"]
description = "Quorp desktop shell (Tauri 2)"

[lib]
name = "quorp_desktop_app_lib"
path = "src/lib.rs"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "quorp-desktop"
path = "src/main.rs"

[dependencies]
# Quorp service layer + DTOs. We pull these in by relative path; the
# crate is intentionally NOT a member of the root cargo workspace so
# that Linux CI can `cargo check --workspace` without the macOS-only
# Tauri/wry tree.
quorp_desktop_core = { path = "../../../crates/quorp_desktop_core" }
quorp_desktop_ipc  = { path = "../../../crates/quorp_desktop_ipc" }

tauri = { version = "2.1", features = ["protocol-asset"] }
tauri-plugin-dialog       = "2"
tauri-plugin-opener       = "2"
tauri-plugin-store        = "2"
tauri-plugin-window-state = "2"
tauri-plugin-updater      = "2"

serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"
env_logger = "0.11"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "2"

[build-dependencies]
tauri-build = "2"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
codegen-units = 1
lto = true
panic = "abort"
strip = true
