[package]
description = "The Quorp session engine and chat-service runtime."
edition.workspace = true
name = "quorp_session"
version = "0.231.0"
publish.workspace = true
license = "GPL-3.0-or-later"
authors = ["Quorp Team <hi@quorp.dev>"]

[lib]
path = "src/quorp_session.rs"

[lints]
workspace = true

[dependencies]
anyhow.workspace = true
async_zip.workspace = true
clap = { workspace = true, features = ["derive"] }
crossterm = "0.28"
futures.workspace = true
ignore.workspace = true
libc.workspace = true
log.workspace = true
notify = "=8.2.0"
paths.workspace = true
portable-pty.workspace = true
quorp_agent_core = { path = "../quorp_agent_core" }
quorp_agent_protocol = { path = "../quorp_agent_protocol" }
quorp_config.workspace = true
quorp_core.workspace = true
quorp_context.workspace = true
quorp_mcp.workspace = true
quorp_lsp.workspace = true
quorp_ids.workspace = true
quorp_memory.workspace = true
quorp_memory_model.workspace = true
quorp_patch_vm.workspace = true
quorp_permissions.workspace = true
quorp_provider.workspace = true
quorp_render.workspace = true
quorp_repo_scan.workspace = true
quorp_rule_forge.workspace = true
quorp_sandbox.workspace = true
quorp_slash.workspace = true
quorp_term.workspace = true
quorp_tools.workspace = true
quorp_verify.workspace = true
reqwest = { workspace = true, features = ["json", "stream"] }
regex.workspace = true
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
smol.workspace = true
tempfile.workspace = true
vt100 = { package = "fnug-vt100", version = "0.15.2" }
tokio = { workspace = true, features = ["io-util", "macros", "process", "rt", "rt-multi-thread", "sync", "time"] }
toml.workspace = true
toml_edit.workspace = true
unicode-width.workspace = true
url.workspace = true
util.workspace = true
walkdir.workspace = true
quorp_log.workspace = true
quorp_tracing.workspace = true

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
ashpd.workspace = true

[dev-dependencies]
pretty_assertions.workspace = true
tempfile.workspace = true

[package.metadata.cargo-machete]
ignored = ["quorp_tracing"]
